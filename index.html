<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Traffic Pattern Vectoring Aid</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #080e18; height: 100%; -webkit-font-smoothing: antialiased; }
    button { -webkit-tap-highlight-color: transparent; font-family: Menlo, Courier New, monospace; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
var DEG = Math.PI / 180;
var mod360 = function(x) { return ((x % 360) + 360) % 360; };
var fmt = function(h) { return String(Math.round(mod360(h)) || 360).padStart(3, "0"); };
var round5 = function(h) { return mod360(Math.round(mod360(h) / 5) * 5) || 360; };
var fmt5 = function(h) { return String(round5(h)).padStart(3, "0"); };
function hvec(deg) { return { x: Math.sin(deg*DEG), y: -Math.cos(deg*DEG) }; }
function perpOf(v, left) { return left ? { x: v.y, y: -v.x } : { x: -v.y, y: v.x }; }

var LEG = {
  final:     { color: "#34d399", label: "FINAL" },
  upwind:    { color: "#22d3ee", label: "UPWIND" },
  crosswind: { color: "#fb923c", label: "X-WIND" },
  downwind:  { color: "#facc15", label: "DOWNWIND" },
  base:      { color: "#c084fc", label: "BASE" }
};

var CX=195, CY=195, R=168, SZ=390, L=100, W=74;
var TAS=200;
var rwy=null, isLeft=null, windDir=0, windSpeed=0;

function selectRwy(n)     { rwy=n; isLeft=null; render(); }
function selectTraffic(v) { isLeft=v; render(); }
function chgTraffic()     { isLeft=null; render(); }
function chgRunway()      { rwy=null; isLeft=null; render(); }
function adjWindDir(d)    { windDir=mod360(windDir+d); render(); }
function adjWindSpd(d)    { windSpeed=Math.max(0,Math.min(60,windSpeed+d)); render(); }
window.selectRwy=selectRwy; window.selectTraffic=selectTraffic;
window.chgTraffic=chgTraffic; window.chgRunway=chgRunway;
window.adjWindDir=adjWindDir; window.adjWindSpd=adjWindSpd;

var FONT="Menlo, Courier New, monospace";

function calcCrab(legHdg) {
  if (windSpeed===0) return 0;
  var s=(windSpeed/TAS)*Math.sin((windDir-legHdg)*DEG);
  return Math.asin(Math.max(-1,Math.min(1,s)))/DEG;
}

function arrowAt(tx, ty, ux, uy, size, color, op) {
  var len=Math.sqrt(ux*ux+uy*uy)||1; ux/=len; uy/=len;
  var w1x=tx-ux*size+uy*size*0.5, w1y=ty-uy*size-ux*size*0.5;
  var w2x=tx-ux*size-uy*size*0.5, w2y=ty-uy*size+ux*size*0.5;
  return '<polygon points="'+tx+","+ty+" "+w1x+","+w1y+" "+w2x+","+w2y+'" fill="'+color+'" opacity="'+(op||1)+'"/>';
}

function buildTicks() {
  var s="";
  for (var d=0;d<360;d+=5) {
    var a=(d-90)*DEG, ca=Math.cos(a), sa=Math.sin(a);
    var isMaj=d%30===0, isMed=d%10===0;
    var inner=isMaj?R-26:isMed?R-16:R-8;
    var stroke=isMaj?"#94a3b8":isMed?"#64748b":"#3f4f63";
    var sw=isMaj?1.5:0.8;
    s+='<line x1="'+(CX+R*ca)+'" y1="'+(CY+R*sa)+'" x2="'+(CX+inner*ca)+'" y2="'+(CY+inner*sa)+'" stroke="'+stroke+'" stroke-width="'+sw+'"/>';
    if (isMed) {
      var lR=R-(isMaj?48:34), lx=CX+lR*ca, ly=CY+lR*sa;
      var card=d===0?"N":d===90?"E":d===180?"S":d===270?"W":null;
      var lbl=card||String(d/10).padStart(2,"0");
      var fs=card?21:14, fw=card?"bold":"normal";
      var fill=d===0?"#f87171":card?"#ffffff":"#cbd5e1";
      s+='<text x="'+lx+'" y="'+ly+'" text-anchor="middle" dominant-baseline="central" font-size="'+fs+'" font-weight="'+fw+'" fill="'+fill+'" font-family="'+FONT+'">'+lbl+'</text>';
    }
  }
  return s;
}
var TICKS=buildTicks();

function buildWindArrow() {
  if (windSpeed===0) return "";
  var wd=windDir*DEG, sx=Math.sin(wd), cx2=-Math.cos(wd);
  var r1=90, r2=42, x1=CX+r1*sx, y1=CY+r1*cx2, x2=CX+r2*sx, y2=CY+r2*cx2;
  var dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy)||1, ux=dx/len, uy=dy/len, as=10;
  var s='<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>';
  s+=arrowAt(x2,y2,ux,uy,as,"#fbbf24",1);
  s+='<text x="'+(CX+(r1+18)*sx)+'" y="'+(CY+(r1+18)*cx2)+'" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="bold" fill="#fbbf24" font-family="'+FONT+'">'+fmt(windDir)+'</text>';
  return s;
}

function buildPattern(rwyHdg, left, hdgs) {
  var rv=hvec(rwyHdg), pv=perpOf(rv,left);
  var B={x:CX, y:CY};
  var T={x:B.x-rv.x*L, y:B.y-rv.y*L};
  var C={x:B.x+pv.x*W, y:B.y+pv.y*W};
  var D={x:T.x+pv.x*W, y:T.y+pv.y*W};
  var F={x:T.x-rv.x*60, y:T.y-rv.y*60};

  var s='<polygon points="'+T.x+","+T.y+" "+B.x+","+B.y+" "+C.x+","+C.y+" "+D.x+","+D.y+'" fill="rgba(255,255,255,0.025)" stroke="none"/>';

  s+='<line x1="'+F.x+'" y1="'+F.y+'" x2="'+T.x+'" y2="'+T.y+'" stroke="'+LEG.final.color+'" stroke-width="1.5" stroke-dasharray="5,3.5" stroke-linecap="round" opacity="0.75"/>';
  s+='<line x1="'+T.x+'" y1="'+T.y+'" x2="'+B.x+'" y2="'+B.y+'" stroke="'+LEG.upwind.color+'" stroke-width="2" stroke-linecap="round"/>';
  s+='<line x1="'+B.x+'" y1="'+B.y+'" x2="'+C.x+'" y2="'+C.y+'" stroke="'+LEG.crosswind.color+'" stroke-width="2" stroke-linecap="round"/>';
  s+='<line x1="'+C.x+'" y1="'+C.y+'" x2="'+D.x+'" y2="'+D.y+'" stroke="'+LEG.downwind.color+'" stroke-width="2" stroke-linecap="round"/>';
  s+='<line x1="'+D.x+'" y1="'+D.y+'" x2="'+T.x+'" y2="'+T.y+'" stroke="'+LEG.base.color+'" stroke-width="2" stroke-linecap="round"/>';

  s+=arrowAt(T.x,T.y, rv.x,rv.y, 12, LEG.final.color, 0.85);
  s+=arrowAt(T.x,T.y, rv.x,rv.y, 16, LEG.upwind.color, 1);
  s+=arrowAt(B.x,B.y, pv.x,pv.y, 14, LEG.crosswind.color, 1);
  s+=arrowAt(C.x,C.y, -rv.x,-rv.y, 14, LEG.downwind.color, 1);
  s+=arrowAt(D.x,D.y, -pv.x,-pv.y, 14, LEG.base.color, 1);

  var rLen=22, rWid=4;
  var p1x=B.x+rv.x*rLen-pv.x*rWid, p1y=B.y+rv.y*rLen-pv.y*rWid;
  var p2x=B.x+rv.x*rLen+pv.x*rWid, p2y=B.y+rv.y*rLen+pv.y*rWid;
  var p3x=B.x-rv.x*rLen+pv.x*rWid, p3y=B.y-rv.y*rLen+pv.y*rWid;
  var p4x=B.x-rv.x*rLen-pv.x*rWid, p4y=B.y-rv.y*rLen-pv.y*rWid;
  s+='<polygon points="'+p1x+","+p1y+" "+p2x+","+p2y+" "+p3x+","+p3y+" "+p4x+","+p4y+'" fill="#0d1929" stroke="#e2e8f0" stroke-width="1.5"/>';
  s+='<line x1="'+(B.x-rv.x*rLen+pv.x*(rWid+2))+'" y1="'+(B.y-rv.y*rLen+pv.y*(rWid+2))+'" x2="'+(B.x-rv.x*rLen-pv.x*(rWid+2))+'" y2="'+(B.y-rv.y*rLen-pv.y*(rWid+2))+'" stroke="white" stroke-width="2.5"/>';
  s+='<line x1="'+(B.x-rv.x*(rLen-4))+'" y1="'+(B.y-rv.y*(rLen-4))+'" x2="'+(B.x+rv.x*(rLen-4))+'" y2="'+(B.y+rv.y*(rLen-4))+'" stroke="white" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.6"/>';

  [{from:T,to:B,key:"upwind",ox:pv.x*-26,oy:pv.y*-26},
   {from:B,to:C,key:"crosswind",ox:rv.x*-26,oy:rv.y*-26},
   {from:C,to:D,key:"downwind",ox:pv.x*26,oy:pv.y*26},
   {from:D,to:T,key:"base",ox:rv.x*26,oy:rv.y*26}
  ].forEach(function(item) {
    var color=LEG[item.key].color;
    var mx=(item.from.x+item.to.x)/2+item.ox, my=(item.from.y+item.to.y)/2+item.oy;
    var trueHdg=hdgs[item.key];
    var disp=windSpeed>0&&Math.abs(calcCrab(trueHdg))>0.5?fmt5(mod360(trueHdg+calcCrab(trueHdg))):fmt(trueHdg);
    s+='<text x="'+mx+'" y="'+my+'" text-anchor="middle" dominant-baseline="central" font-size="17" font-family="'+FONT+'" font-weight="bold" fill="'+color+'">'+disp+'&#176;</text>';
  });
  return s;
}

function windPanel() {
  var hw=windSpeed>0, dc=hw?"#fbbf24":"#ffffff", sc=hw?"#fbbf24":"#ffffff";
  var btn="background:#1e3048;border:1px solid #2a3f55;color:#ffffff;border-radius:6px;padding:10px 16px;font-size:16px;cursor:pointer;font-weight:bold;";
  return '<div style="margin-top:14px;width:100%;max-width:310px;background:#0c1624;border:1px solid #2a3f55;border-radius:10px;padding:12px 14px;">'
    +'<div style="font-size:13px;letter-spacing:4px;color:#ffffff;text-align:center;margin-bottom:12px;font-family:Helvetica,Arial,sans-serif;font-weight:700;">WIND</div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">'
    +'<span style="color:#ffffff;font-size:13px;letter-spacing:3px;width:36px;font-family:Helvetica,Arial,sans-serif;font-weight:700;">DIR</span>'
    +'<button onclick="adjWindDir(-10)" style="'+btn+'">&#8722;</button>'
    +'<span style="color:'+dc+';font-size:15px;font-weight:bold;min-width:64px;text-align:center;">'+fmt(windDir)+'&#176;</span>'
    +'<button onclick="adjWindDir(10)" style="'+btn+'">+</button>'
    +'</div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;">'
    +'<span style="color:#ffffff;font-size:13px;letter-spacing:3px;width:36px;font-family:Helvetica,Arial,sans-serif;font-weight:700;">SPD</span>'
    +'<button onclick="adjWindSpd(-5)" style="'+btn+'">&#8722;</button>'
    +'<span style="color:'+sc+';font-size:15px;font-weight:bold;min-width:64px;text-align:center;">'+windSpeed+' kts</span>'
    +'<button onclick="adjWindSpd(5)" style="'+btn+'">+</button>'
    +'</div>'
    +(hw?'<div style="margin-top:8px;font-size:9px;color:#94a3b8;text-align:center;letter-spacing:1px;">WIND FROM '+fmt(windDir)+'&#176; AT '+windSpeed+' KTS &mdash; CRAB AT 200 KT TAS</div>':'')
    +'</div>';
}

function render() {
  var rwyHdg=rwy?(rwy===36?360:rwy*10):null;
  var hasPattern=rwy!==null&&isLeft!==null;
  var hdgs=hasPattern?{
    final:rwyHdg, upwind:rwyHdg,
    crosswind:isLeft?mod360(rwyHdg-90):mod360(rwyHdg+90),
    downwind:mod360(rwyHdg+180),
    base:isLeft?mod360(rwyHdg+90):mod360(rwyHdg-90)
  }:null;

  var patSvg=hasPattern?buildPattern(rwyHdg,isLeft,hdgs):"";
  var windSvg=buildWindArrow();
  var xo=hasPattern?0.15:0.35;

  var legTable="";
  if (hasPattern) {
    var rows="", hw=windSpeed>0;
    Object.entries(LEG).forEach(function(e) {
      var key=e[0], color=e[1].color, label=e[1].label;
      var th=hdgs[key], crab=calcCrab(th), adj=mod360(th+crab), adjStr=fmt5(adj);
      var cr=round5(adj)-round5(th); if(cr>180)cr-=360; if(cr<-180)cr+=360;
      var cs=cr>=0?"+"+cr:String(cr);
      rows+='<div style="display:flex;align-items:center;gap:6px;white-space:nowrap;margin-bottom:4px;">'
        +'<div style="width:12px;height:12px;border-radius:3px;background:'+color+';flex-shrink:0;"></div>'
        +'<span style="color:'+color+';min-width:68px;font-weight:bold;font-size:13px;">'+label+'</span>'
        +'<span style="color:'+color+';font-weight:bold;font-size:16px;">'+fmt(th)+'&#176;</span>'
        +(hw&&Math.abs(crab)>0.5?'<span style="color:#94a3b8;font-size:12px;">&#8594;</span><span style="color:'+color+';font-weight:bold;font-size:16px;">'+adjStr+'&#176;</span><span style="color:#94a3b8;font-size:10px;">('+cs+'&#176;)</span>':"")
        +'</div>';
      if (key==="final") {
        var it=isLeft?mod360(th+30):mod360(th-30), ic=calcCrab(it), ia=mod360(it+ic);
        var is=Math.abs(ic)>0.5?fmt5(ia):fmt(it);
        var ir=round5(ia)-round5(it); if(ir>180)ir-=360; if(ir<-180)ir+=360;
        var ics=ir>=0?"+"+ir:String(ir);
        rows+='<div style="display:flex;align-items:center;gap:6px;white-space:nowrap;margin-bottom:4px;margin-left:20px;padding:4px 8px;background:rgba(52,211,153,0.08);border-radius:5px;border-left:2px solid #34d399;">'
          +'<span style="color:#34d399;min-width:68px;font-size:11px;letter-spacing:1px;">30&#176; INTCPT</span>'
          +'<span style="color:#34d399;font-weight:bold;font-size:16px;">'+fmt(it)+'&#176;</span>'
          +(hw&&Math.abs(ic)>0.5?'<span style="color:#94a3b8;font-size:12px;">&#8594;</span><span style="color:#34d399;font-weight:bold;font-size:16px;">'+is+'&#176;</span><span style="color:#94a3b8;font-size:10px;">('+ics+'&#176;)</span>':"")
          +'</div>';
      }
    });
    legTable='<div style="margin-top:12px;width:100%;max-width:310px;background:#0c1624;border:1px solid #1e3048;border-radius:10px;padding:12px 14px;">'
      +'<div style="font-size:9px;letter-spacing:3px;color:#ffffff;margin-bottom:8px;">HEADINGS'+(windSpeed>0?' &mdash; TRUE &#8594; WIND CORRECTED':'')+'</div>'
      +rows+'</div>';
  }

  var controls="";
  if (rwy===null) {
    var btns="";
    for(var n=1;n<=36;n++) btns+='<button onclick="selectRwy('+n+')" style="background:#0c1624;border:1px solid #1a2a3a;color:#cbd5e1;border-radius:4px;padding:8px 0;font-size:13px;cursor:pointer;letter-spacing:1px;">'+String(n).padStart(2,"0")+'</button>';
    controls='<div style="font-size:13px;letter-spacing:4px;color:#ffffff;text-align:center;margin-bottom:10px;font-family:Helvetica,Arial,sans-serif;font-weight:700;">SELECT RUNWAY</div>'
      +'<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px;">'+btns+'</div>';
  } else if (isLeft===null) {
    controls='<div style="font-size:13px;letter-spacing:4px;color:#ffffff;text-align:center;margin-bottom:12px;font-family:Helvetica,Arial,sans-serif;font-weight:700;">TRAFFIC DIRECTION</div>'
      +'<div style="display:flex;gap:8px;">'
      +'<button onclick="selectTraffic(true)" style="flex:1;background:#0c1624;border:1px solid #2a3f55;color:#fff;border-radius:6px;padding:12px 0;font-size:14px;letter-spacing:2px;cursor:pointer;font-weight:bold;">&#8592; LEFT</button>'
      +'<button onclick="selectTraffic(false)" style="flex:1;background:#0c1624;border:1px solid #2a3f55;color:#fff;border-radius:6px;padding:12px 0;font-size:14px;letter-spacing:2px;cursor:pointer;font-weight:bold;">RIGHT &#8594;</button>'
      +'</div>';
  } else {
    controls='<div style="display:flex;gap:6px;">'
      +'<button onclick="chgTraffic()" style="flex:1;background:#0c1624;border:1px solid #2a3f55;color:#fff;border-radius:5px;padding:12px 0;font-size:13px;letter-spacing:2px;cursor:pointer;font-weight:bold;">CHG TRAFFIC</button>'
      +'<button onclick="chgRunway()" style="flex:1;background:#0c1624;border:1px solid #2a3f55;color:#fff;border-radius:5px;padding:12px 0;font-size:13px;letter-spacing:2px;cursor:pointer;font-weight:bold;">CHG RUNWAY</button>'
      +'</div>';
  }

  var header=hasPattern
    ?'<div style="font-size:14px;color:#e2e8f0;letter-spacing:2px;font-weight:bold;">RWY '+String(rwy).padStart(2,"0")+" &#183; "+(isLeft?"LEFT":"RIGHT")+" TRAFFIC &#183; HDG "+fmt(rwyHdg)+"&#176;</div>"
    :"";

  document.getElementById("app").innerHTML=
    '<div style="min-height:100vh;background:#080e18;color:#e2e8f0;font-family:Menlo,Courier New,monospace;display:flex;flex-direction:column;align-items:center;padding:16px;">'
    +'<div style="text-align:center;margin-bottom:10px;">'
    +'<div style="font-size:13px;letter-spacing:4px;color:#ffffff;margin-bottom:4px;font-weight:bold;">TRAFFIC PATTERN VECTORING AID</div>'
    +header+'</div>'
    +'<div style="border-radius:50%;border:1.5px solid #1a2535;box-shadow:0 0 0 6px #0a1020,0 0 0 7px #1a2535;background:radial-gradient(circle at 40% 35%,#0d1929 0%,#080e18 100%);">'
    +'<svg width="'+SZ+'" height="'+SZ+'" xmlns="http://www.w3.org/2000/svg" text-rendering="geometricPrecision" shape-rendering="geometricPrecision">'
    +'<circle cx="'+CX+'" cy="'+CY+'" r="'+(R+5)+'" fill="none" stroke="#1a2535" stroke-width="1"/>'
    +'<circle cx="'+CX+'" cy="'+CY+'" r="'+R+'" fill="none" stroke="#1e3048" stroke-width="0.5"/>'
    +TICKS
    +'<polygon points="'+CX+","+(CY-R-1)+" "+(CX-5)+","+(CY-R-11)+" "+(CX+5)+","+(CY-R-11)+'" fill="#f87171"/>'
    +'<g opacity="'+xo+'">'
    +'<line x1="'+(CX-18)+'" y1="'+CY+'" x2="'+(CX+18)+'" y2="'+CY+'" stroke="#3a4f65" stroke-width="0.8"/>'
    +'<line x1="'+CX+'" y1="'+(CY-18)+'" x2="'+CX+'" y2="'+(CY+18)+'" stroke="#3a4f65" stroke-width="0.8"/>'
    +'<circle cx="'+CX+'" cy="'+CY+'" r="5" fill="none" stroke="#3a4f65" stroke-width="0.8"/>'
    +'</g>'
    +windSvg+patSvg
    +'</svg></div>'
    +windPanel()+legTable
    +'<div style="margin-top:14px;width:100%;max-width:310px;">'+controls+'</div>'
    +'<div style="margin-top:14px;font-size:7px;color:#1a2535;letter-spacing:2px;">TRAINING AID ONLY &#8212; NOT FOR OPERATIONAL USE</div>'
    +'</div>';
}
render();
</script>
</body>
</html>
